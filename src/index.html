<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Background Atmospheric Glow -->
    <div class="weather-glow"></div>

    <!-- TopAppBar -->
    <header class="app-header">
        <div class="logo-wrapper">
            <h1 class="logo">AETHER</h1>
        </div>
        
        <div class="search-container">
            <span class="material-symbols-outlined search-icon">search</span>
            <input class="search-input" placeholder="Search city..." type="text"/>
        </div>
        
        <div class="toggle-group">
            <button class="toggle-btn active">F</button>
            <button class="toggle-btn inactive">C</button>
        </div>
    </header>

    <main class="main-layout">
        
    </main>

    <!-- Error Toast Simulation -->
    <div class="error-toast">
        <span class="material-symbols-outlined">error</span>
        <span>City not found. Please try again.</span>
    </div>

    <!-- Visual Polish: Background Images with Data Alts -->
    <div class="bg-image-wrapper">
        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuBiy3lFCW8c9Dxm11NkgjCW7NZ8sDWB-pH7zJXReePP2t5l-FCywk6aYQgLhUzVzp7Le1rMjxpq8CK7PKh9tHOeemO1an1nDCHHwBAjv63w3DdWvxuYxSRGzfdcaI-NlvIhjHSWSDprsv0oAmAy7ms6X5AcC4TKczY8_R-IXAR01HGjOkib4sxqleojidSXBoWh4MDaQbVJkiZMy-8KWK5rF7ZDnUZL_hj-mYIwLTW_mVv3J9OBvgVrLoYFzE6BeRKjvgCr0IYsQg" alt="Atmospheric weather background" />
    </div>

</body>
</html>
